<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>日の詳細</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cat-胸 { border-left: 5px solid #ff5e5e; } .cat-背中 { border-left: 5px solid #f1c40f; }
        .cat-肩 { border-left: 5px solid #3498db; } .cat-腕 { border-left: 5px solid #9b59b6; }
        .cat-脚 { border-left: 5px solid #2ecc71; } .cat-腹 { border-left: 5px solid #e67e22; }
    </style>
</head>
<body class="bg-light p-4">
<div class="container bg-white shadow rounded p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${#temporals.format(targetDate, 'yyyy年MM月dd日')} + ' の記録'"></h2>
        <div class="d-flex gap-2">
            <a th:href="@{/training/add-empty(date=${targetDate})}" class="btn btn-primary btn-sm">➕ この日に種目を追加</a>
            <a th:href="@{/training/calendar}" class="btn btn-secondary btn-sm">カレンダーに戻る</a>
        </div>
    </div>
    <div th:if="${metrics != null}" class="alert alert-info row g-2 mb-4 mx-0">
        <div class="col-12 fw-bold text-uppercase">⚖️ Body Metrics</div>
        <div class="col-md-2">体重: <span th:text="${metrics.weight}"></span>kg</div>
        <div class="col-md-2">体脂肪: <span th:text="${metrics.bodyFat}"></span>%</div>
        <div class="col-md-2">筋肉量: <span th:text="${metrics.muscleMass}"></span>kg</div>
        <div class="col-md-2">水分量: <span th:text="${metrics.water}"></span>%</div>
        <div class="col-md-2">BMI: <span th:text="${metrics.bmi}"></span></div>
    </div>
    <div class="list-group">
        <div th:each="log : ${logs}" class="list-group-item mb-2 border rounded" th:classappend="'cat-' + ${log.category}">
            <span class="badge bg-secondary me-2" th:text="${log.category}"></span><strong th:text="${log.exercise}"></strong>
            <span class="text-muted small ms-2" th:text="'⏱ ' + ${log.durationMinutes} + '分'"></span>
            <div class="mt-2">
                <span th:each="s : ${log.sets}" class="badge bg-light text-dark border me-1" th:text="${s.weight} + 'kg × ' + ${s.reps} + '回'"></span>
            </div>
            <div th:if="${log.memo != null && log.memo != ''}" class="small text-muted mt-2 p-2 bg-light rounded" th:text="${log.memo}"></div>
        </div>
    </div>
</div>
</body>
</html>
