<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>投稿の編集</title>
    <!-- 📋 Bootstrapの読み込み -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 600px; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h2 class="h5 mb-0">投稿の編集</h2>
            </div>
            <div class="card-body">
                <!-- 📍 更新処理を行う /update にデータを送信します -->
                <form action="/update" method="post">
                    <!-- ⌨️ IDは隠して送信（これがないと更新できません） -->
                    <input type="hidden" name="id" th:value="${message.id}">

                    <div class="mb-3">
                        <label class="form-label font-weight-bold">お名前</label>
                        <input type="text" name="name" th:value="${message.name}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label font-weight-bold">内容</label>
                        <textarea name="text" class="form-control" rows="4" required th:text="${message.text}"></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">更新する</button>
                        <a href="/" class="btn btn-outline-secondary">戻る</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
