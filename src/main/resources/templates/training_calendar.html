<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>トレカレ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style> .fc-daygrid-day { cursor: pointer; } </style>
</head>
<body class="p-4 bg-light">
    <div class="container shadow p-4 rounded bg-white">
        <a th:href="@{/training}" class="btn btn-secondary mb-3">← ホームに戻る</a>
        <div id='calendar'></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                events: '/training/api/calendar',
                dateClick: function(info) { window.location.href = '/training/day/' + info.dateStr; },
                eventClick: function(info) { window.location.href = '/training/day/' + info.event.startStr.split('T')[0]; }
            });
            calendar.render();
        });
    </script>
</body>
</html>
