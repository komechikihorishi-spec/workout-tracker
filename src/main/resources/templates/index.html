<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>マイ掲示板</title>
    <!-- 📋 Bootstrapの読み込み（CDN） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="container shadow-sm p-4 mb-5 bg-white rounded">
        <h1 class="text-center mb-4 text-primary">一言掲示板</h1>

        <!-- ログアウト -->
        <div class="text-end mb-3">
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-outline-secondary btn-sm">ログアウト</button>
            </form>
        </div>

        <!-- 成功メッセージ -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMsg}"></span>
        </div>

        <!-- 投稿フォーム -->
        <div class="card mb-4">
            <div class="card-body">
                <form action="/add" method="post" th:object="${message}">
                    <div class="mb-3">
                        <label class="form-label">お名前</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="お名前">
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">内容</label>
                        <textarea th:field="*{text}" class="form-control" rows="2" placeholder="今なにしてる？"></textarea>
                        <p th:if="${#fields.hasErrors('text')}" th:errors="*{text}" class="text-danger small"></p>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">投稿する</button>
                </form>
            </div>
        </div>

        <!-- 検索フォーム -->
        <div class="row g-2 mb-4">
            <div class="col-md-6">
                <form action="/searchName" method="get" class="d-flex gap-2">
                    <input type="text" name="keyword" class="form-control form-control-sm" placeholder="名前で検索">
                    <button type="submit" class="btn btn-secondary btn-sm text-nowrap">名前検索</button>
                </form>
            </div>
            <div class="col-md-6">
                <form action="/search" method="get" class="d-flex gap-2">
                    <input type="text" name="keyword" class="form-control form-control-sm" placeholder="内容で検索">
                    <button type="submit" class="btn btn-secondary btn-sm text-nowrap">内容検索</button>
                </form>
            </div>
        </div>

        <a href="/" class="btn btn-link mb-3 p-0">全件表示に戻る</a>

        <!-- 投稿一覧 -->
        <div class="list-group">
            <div th:each="m : ${messages}" class="list-group-item list-group-item-action p-3">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1 text-primary" th:text="${m.name}">名前</h5>
                    <small class="text-muted" th:text="${#temporals.format(m.createdAt, 'yyyy/MM/dd HH:mm')}"></small>
                </div>
                <p class="mb-2" th:text="${m.text}">内容</p>
                <div class="text-end">
                    <a th:href="@{/edit/{id}(id=${m.id})}" class="btn btn-sm btn-outline-warning">編集</a>
                    <a th:href="@{/delete(id=${m.id})}" 
                       onclick="return confirm('本当に削除してもよろしいですか？');" 
                       class="btn btn-sm btn-outline-danger">削除</a>
                </div>
            </div>
        </div>

        <!-- ページネーション -->
        <nav class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/(page=${currentPage - 1})}">前へ</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/(page=${currentPage + 1})}">次へ</a>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>
