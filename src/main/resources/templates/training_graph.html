<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>成長分析</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="p-4 bg-light">
    <div class="container bg-white p-4 shadow rounded">
        <a th:href="@{/training}" class="btn btn-secondary mb-4">← 戻る</a>
        <h3>⚖️ コンディション推移</h3>
        <select id="metricSelector" class="form-select mb-3 w-50" onchange="updateMetricChart()">
            <option value="weight">体重 (kg)</option>
            <option value="bodyFat">体脂肪率 (%)</option>
            <option value="muscle">筋肉量 (kg)</option>
            <option value="water">水分量 (%)</option>
            <option value="bmi">BMI</option>
        </select>
        <canvas id="mChart" class="mb-5" style="max-height:300px;"></canvas>

        <h3>📊 種目別成長</h3>
        <form method="get" th:action="@{/training/graph}" class="row g-2 mb-4">
            <div class="col-8"><select name="exercise" class="form-select">
                <option value="">種目を選んでください</option>
                <option th:each="ex : ${exercises}" th:value="${ex}" th:text="${ex}" th:selected="${ex == selectedExercise}"></option>
            </select></div>
            <div class="col-4"><button class="btn btn-primary w-100">表示</button></div>
        </form>
        <canvas id="exChart" style="max-height:400px;"></canvas>
    </div>

    <div id="data-box" style="display:none;"
         th:data-labels="${mLabelsJson}"
         th:data-weight="${mWeightJson}"
         th:data-fat="${mBodyFatJson}"
         th:data-muscle="${mMuscleJson}"
         th:data-water="${mWaterJson}"
         th:data-bmi="${mBmiJson}"
         th:data-selected="${selectedExercise}"
         th:data-ex-labels="${labelsJson}"
         th:data-ex-ylabel="${yLabel}"
         th:data-ex-data="${dataJson}"></div>

    <script>
        const box = document.getElementById('data-box');
        const mLabels = JSON.parse(box.getAttribute('data-labels') || '[]');
        const mData = {
            weight: JSON.parse(box.getAttribute('data-weight') || '[]'),
            bodyFat: JSON.parse(box.getAttribute('data-fat') || '[]'),
            muscle: JSON.parse(box.getAttribute('data-muscle') || '[]'),
            water: JSON.parse(box.getAttribute('data-water') || '[]'),
            bmi: JSON.parse(box.getAttribute('data-bmi') || '[]')
        };
        
        let metricChart;
        function updateMetricChart() {
            const s = document.getElementById('metricSelector');
            if (metricChart) metricChart.destroy();
            metricChart = new Chart(document.getElementById('mChart'), {
                type: 'line',
                data: { labels: mLabels, datasets: [{ label: s.options[s.selectedIndex].text, data: mData[s.value], borderColor: '#e74c3c', fill: false }] }
            });
        }
        updateMetricChart();

        const selectedEx = box.getAttribute('data-selected');
        if (selectedEx && selectedEx !== 'null' && selectedEx !== '') {
            new Chart(document.getElementById('exChart'), {
                type: 'line',
                data: {
                    labels: JSON.parse(box.getAttribute('data-ex-labels') || '[]'),
                    datasets: [{ label: box.getAttribute('data-ex-ylabel'), data: JSON.parse(box.getAttribute('data-ex-data') || '[]'), borderColor: '#3498db', fill: false }]
                }
            });
        }
    </script>
</body>
</html>
