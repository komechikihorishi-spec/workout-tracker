# MySQLへの接続設定
# 住所: localhost(自分)の3306番ポートにある "gym_log_db" に繋ぐ
spring.datasource.url=jdbc:mysql://localhost:3306/gym_log_db?characterEncoding=UTF-8&serverTimezone=Asia/Tokyo
spring.datasource.username=root
# ⌨️ パスワードは MySQL インストール時に決めたものに書き換えてください
spring.datasource.password=M25chiki
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate（JPA）の設定
# update: Javaのクラスを見て、MySQL側にテーブルを自動作成・更新する
spring.jpa.hibernate.ddl-auto=update
# 実行されるSQL文をコンソールに表示する
spring.jpa.show-sql=true
# MySQL用の言語（方言）を使用する
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect